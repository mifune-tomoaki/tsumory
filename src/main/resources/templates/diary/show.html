<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <body>
    <th:block th:replace="~{fragments/layout :: layout(title='今日の日記', content=~{::section})}">
      <section>
        <p class="text-muted small">
          生成日時: <span th:text="${diary.generatedAt()}">2024-01-01 00:00</span>
        </p>
        <p class="mb-4" style="white-space: pre-wrap" th:text="${diary.body()}">日記本文</p>

        <form th:action="@{/diaries/generate}" method="post" id="diary-generate-form" class="d-inline">
          <input
            type="hidden"
            th:if="${_csrf != null}"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
          />
          <button type="submit" class="btn btn-success" id="diary-generate-button">作り直す</button>
        </form>
        <a th:href="@{/posts}" class="btn btn-outline-secondary">ホームへ戻る</a>

        <script>
          const diaryGenerateForm = document.getElementById('diary-generate-form');
          if (diaryGenerateForm) {
            diaryGenerateForm.addEventListener('submit', function () {
              const button = document.getElementById('diary-generate-button');
              button.disabled = true;
              button.innerHTML =
                '<span class="spinner-border spinner-border-sm me-1"></span>作り直しています…';
            });
          }
        </script>
      </section>
    </th:block>
  </body>
</html>
