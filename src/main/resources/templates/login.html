<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <body>
    <th:block th:replace="~{fragments/layout :: layout(title='ログイン', content=~{::section})}">
      <section class="d-flex justify-content-center">
        <div class="card mt-5" style="max-width: 400px; width: 100%">
          <div class="card-body">
            <h1 class="card-title h4 mb-4 text-center">ログイン</h1>
            <div th:if="${param.error}" class="alert alert-danger" role="alert">
              メールアドレスまたはパスワードが正しくありません
            </div>
            <form th:action="@{/login}" method="post">
              <input
                type="hidden"
                th:if="${_csrf != null}"
                th:name="${_csrf.parameterName}"
                th:value="${_csrf.token}"
              />
              <div class="mb-3">
                <label for="username" class="form-label">メールアドレス</label>
                <input
                  type="email"
                  class="form-control"
                  id="username"
                  name="username"
                  required
                  autofocus
                />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">パスワード</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  name="password"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary w-100">ログイン</button>
            </form>
          </div>
        </div>
      </section>
    </th:block>
  </body>
</html>
